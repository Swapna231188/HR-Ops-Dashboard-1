<title>Onboarding Tracker — India Operations</title>

<style>
:root{--bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;--border:#E4E1DA;--border2:#D0CCC3;--text:#1A1917;--text2:#6B6860;--text3:#9E9B94;--green:#1D9E75;--gl:#E1F5EE;--gm:#9FE1CB;--blue:#2563EB;--bl:#EFF6FF;--purple:#7C3AED;--pl:#F5F3FF;--red:#DC2626;--rl:#FEF2F2;--r:10px;--rl2:14px;--sh:0 1px 3px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:30px;height:30px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.nav-title{font-size:14px;font-weight:600}
.nav-sub{font-size:11px;color:var(--text3);margin-top:1px}
.nav-right{display:flex;align-items:center;gap:8px}
.badge{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.sb-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:10px}
.search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none}
.search::placeholder{color:var(--text3)}
.emp-list{flex:1;overflow-y:auto;padding:8px}
.emp-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:background .12s;margin-bottom:2px}
.emp-item:hover,.emp-item.active{background:var(--surface2)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ei{flex:1;min-width:0}
.en{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.mfill{height:100%;background:var(--green);border-radius:2px}
.epct{font-size:11px;font-weight:500;color:var(--text3);flex-shrink:0;font-family:"DM Mono",monospace}
.add-btn{margin:8px;padding:10px;border:1px dashed var(--border2);border-radius:var(--r);background:none;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.add-btn:hover{background:var(--surface2);color:var(--text)}
.main{padding:22px;overflow-y:auto}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
.w-icon{font-size:40px;margin-bottom:16px}
.w-title{font-size:18px;font-weight:500;margin-bottom:8px}
.w-sub{font-size:13px;color:var(--text2);max-width:320px;line-height:1.65}
.emp-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.hrow{display:flex;align-items:flex-start;gap:13px;margin-bottom:16px}
.av-lg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.hinfo{flex:1}
.hname{font-size:17px;font-weight:600}
.hmeta{font-size:12px;color:var(--text2);margin-top:3px}
.hacts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.hbtn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s;text-decoration:none}
.hbtn:hover{background:var(--surface2);color:var(--text)}
.hbtn.jira{background:var(--bl);color:var(--blue);border-color:#BFDBFE}
.hbtn.jira:hover{background:#DBEAFE}
.hbtn.danger{color:var(--red);border-color:#FECACA}
.hbtn.danger:hover{background:var(--rl)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:13px}
.met{background:var(--bg);border-radius:var(--r);padding:10px 12px}
.ml{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.mv{font-size:19px;font-weight:600;font-family:"DM Mono",monospace}
.mv.green{color:var(--green)}
.ptrack{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
.plbl{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace}
.cl-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.cl-tab{padding:6px 13px;border:1px solid var(--border);border-radius:20px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
.cl-tab:hover{border-color:var(--border2);color:var(--text)}
.cl-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.ctn{font-size:10px;opacity:.65;margin-left:3px;font-family:"DM Mono",monospace}
.phase{margin-bottom:20px}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.pnm{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
.pp{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;max-width:72px}
.ppf{height:100%;background:var(--green);border-radius:2px}
.pct{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--text3);font-family:"DM Mono",monospace}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .1s}
.task:hover{background:var(--surface2)}
.task.done{opacity:.45}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:var(--surface)}
.task.done .tcb{background:var(--green);border-color:var(--green)}
.ck{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.task.done .ck{display:block}
.tb{flex:1;min-width:0}
.tt{font-size:13px;color:var(--text);line-height:1.45}
.task.done .tt{text-decoration:line-through;color:var(--text3)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.to{background:var(--bl);color:var(--blue)}
.tl{background:var(--gl);color:#065F46}
.tc{background:var(--pl);color:var(--purple)}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl2);padding:24px;width:100%;max-width:420px;box-shadow:var(--shm);animation:su .2s ease}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.mtitle{font-size:15px;font-weight:600;margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none}
.info-box{border-radius:var(--r);padding:11px 13px;margin-bottom:12px;font-size:12px;line-height:1.55}
.info-box.blue{background:var(--bl);border:1px solid #BFDBFE;color:#1E40AF}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbtn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.mbtn:hover{background:var(--surface2)}
.mbtn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.mbtn.primary:hover{background:#2d2c2a}
.mbtn:disabled{opacity:.5;cursor:not-allowed}
#toasts{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:var(--r);font-size:13px;box-shadow:var(--shm);display:flex;align-items:flex-start;gap:8px;animation:ti .2s ease;max-width:340px;line-height:1.4}
@keyframes ti{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{background:var(--gl);color:#065F46;border:1px solid var(--gm)}
.toast.error{background:var(--rl);color:#991B1B;border:1px solid #FECACA}
.toast.info{background:var(--bl);color:#1E40AF;border:1px solid #BFDBFE}
.spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;margin-top:1px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:24px;text-align:center;font-size:12px;color:var(--text3)}
a.jlink{color:var(--blue);font-size:12px;text-decoration:none}
a.jlink:hover{text-decoration:underline}
</style>
</head>

const PAL=[{bg:"#EFF6FF",c:"#1D4ED8"},{bg:"#F0FDF4",c:"#15803D"},{bg:"#FDF4FF",c:"#7E22CE"},{bg:"#FFF7ED",c:"#C2410C"},{bg:"#FFF1F2",c:"#BE123C"},{bg:"#F0FDFA",c:"#0F766E"}];

const SK="obt_imc_v1";

function load(){try{const s=localStorage.getItem(SK);if(s)emps=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(emps));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function inits(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";}
function pal(id){let h=0;for(const c of id)h=(h*31+c.charCodeAt(0))&0xfffffff;return PAL[h%PAL.length];}
function tks(cl){return DATA[cl].phases.flatMap(p=>p.tasks);}
function dnCnt(e,cl){const ch=e.checks[cl]||{};return tks(cl).filter(t=>ch[t.id]).length;}
function ovPct(e){const t=tks(e.type).length;const d=dnCnt(e,e.type);return t?Math.round(d/t*100):0;}

function toast(msg,type,dur){
  dur=dur||4500;
  const el=document.createElement("div");
  el.className="toast "+type;
  const icons={success:"&#10003;",error:"&#10005;",info:"&#8505;"};
  el.innerHTML="<span>"+(icons[type]||"&#8505;")+"</span><span>"+msg+"</span>";
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>el.remove(),dur);
}

async function jiraFetch(path,method,body){
  const url="https://"+JIRA_SITE+"/rest/api/3/"+path;
  const r=await fetch(url,{method:method,headers:{"Authorization":"Basic "+btoa(JIRA_EMAIL+":"+JIRA_TOKEN),"Content-Type":"application/json","Accept":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.json();
}

async function createJiraProject(e){
  const cl=e.type;
  const raw=e.name.replace(/[^A-Za-z]/g,"").toUpperCase();
  const key=("IMC"+(raw.slice(0,3))+Date.now().toString(36).slice(-2)).slice(0,10);
  toast("Creating Jira project for "+e.name+"... this may take a moment.","info",20000);
  const proj=await jiraFetch("project","POST",{
    key:key,
    name:e.name+" - "+cl,
    projectTypeKey:"software",
    projectTemplateKey:"com.pyxis.greenhopper.jira:gh-simplified-agility-scrum",
    description:"Onboarding checklist for "+e.name+". Type: "+cl+". DOJ: "+(e.doj||"TBD")+". Created by Onboarding Tracker."
  });
  const pk=proj.key;
  for(const phase of DATA[cl].phases){
    for(const task of phase.tasks){
      await jiraFetch("issue","POST",{fields:{
        project:{key:pk},
        summary:"["+phase.name+"] "+task.n+". "+task.t,
        description:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:"Owner: "+task.own+"\nTimeline: "+task.tl+"\nCategory: "+task.cat}]}]},
        issuetype:{name:"Task"},
        labels:[task.own.replace(/[\s\/\-]+/g,"_"),task.cat.replace(/[\s\/\-]+/g,"_")]
      }});
    }
  }
  return{pk:pk,url:"https://"+JIRA_SITE+"/jira/software/projects/"+pk+"/boards"};
}

    });

  });
  area.innerHTML=html;
}

function toggle(id,cl,tid){if(!emps[id])return;const ct=emps[id].type;if(!emps[id].checks[ct])emps[id].checks[ct]={};emps[id].checks[ct][tid]=!emps[id].checks[ct][tid];save();renderSidebar();renderMain();}

async function retryJira(id){
  const e=emps[id];if(!e)return;
  try{
    const{pk,url}=await createJiraProject(e);
    e.jiraProjKey=pk;e.jiraUrl=url;save();
    toast("Jira project "+pk+" created! <a href='"+url+"' target='_blank' class='jlink'>Open &#8599;</a>","success",8000);
    renderMain();
  }catch(err){toast("Jira error: "+err.message,"error",8000);}
}

function showAdd(){
  document.getElementById("modal-inner").innerHTML=
    "<div class='mtitle'>Add new employee</div>"
    +"<div class='field'><label>Full name *</label><input id='mn' placeholder='e.g. Priya Sharma'/></div>"
    +"<div class='field'><label>Role / designation</label><input id='mr' placeholder='e.g. Analyst'/></div>"
    +"<div class='field'><label>Department</label><input id='md' placeholder='e.g. Finance'/></div>"
    +"<div class='field'><label>Date of joining</label><input id='mdoj' type='date'/></div>"
    +"<div class='field'><label>Checklist type</label><select id='mt'><option>Local Onboarding</option><option>International Incoming</option><option>Local Offboarding</option><option>International Outgoing</option></select></div>"
    +"<div class='info-box blue'>&#11043; A Jira project will be auto-created at imcfm.atlassian.net with all tasks as issues.</div>"
    +"<div class='mbtns'><button class='mbtn' onclick='closeModal()'>Cancel</button><button class='mbtn primary' id='add-submit' onclick='addEmp()'>+ Add &amp; create Jira project</button></div>";
  document.getElementById("modal").classList.add("open");
}

function showEdit(id){
  const e=emps[id];if(!e)return;
  document.getElementById("modal-inner").innerHTML=
    "<div class='mtitle'>Edit employee</div>"
    +"<div class='field'><label>Full name *</label><input id='mn' value='"+e.name+"'/></div>"
    +"<div class='field'><label>Role / designation</label><input id='mr' value='"+(e.role||"")+"'/></div>"
    +"<div class='field'><label>Department</label><input id='md' value='"+(e.dept||"")+"'/></div>"
    +"<div class='field'><label>Date of joining</label><input id='mdoj' type='date' value='"+(e.doj||"")+"'/></div>"
    +"<div class='mbtns'><button class='mbtn' onclick='closeModal()'>Cancel</button><button class='mbtn primary' onclick='saveEdit(\""+id+"\")'>Save changes</button></div>";
  document.getElementById("modal").classList.add("open");
}

async function addEmp(){
  const name=document.getElementById("mn").value.trim();if(!name)return;
  const btn=document.getElementById("add-submit");
  btn.disabled=true;btn.innerHTML="<span class='spin'></span> Creating Jira project...";
  const type=document.getElementById("mt").value;
  const id=uid();
  const e={name:name,role:document.getElementById("mr").value.trim(),dept:document.getElementById("md").value.trim(),doj:document.getElementById("mdoj").value,type:type,checks:{},jiraProjKey:null,jiraUrl:null};
  emps[id]=e;
  try{
    const{pk,url}=await createJiraProject(e);
    e.jiraProjKey=pk;e.jiraUrl=url;
    toast("Jira project "+pk+" created for "+name+"! <a href='"+url+"' target='_blank' class='jlink'>Open &#8599;</a>","success",10000);
  }catch(err){
    toast("Employee added but Jira project failed: "+err.message,"error",8000);
  }
  save();closeModal();curCL=type;sel=id;renderSidebar();renderMain();
}

function saveEdit(id){
  const name=document.getElementById("mn").value.trim();if(!name)return;
  Object.assign(emps[id],{name:name,role:document.getElementById("mr").value.trim(),dept:document.getElementById("md").value.trim(),doj:document.getElementById("mdoj").value});
  save();closeModal();renderSidebar();renderMain();
}

function delEmp(id){
  if(!confirm("Remove this employee? Their Jira project will remain on imcfm.atlassian.net."))return;
  delete emps[id];if(sel===id)sel=null;save();renderSidebar();renderMain();
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===e.currentTarget)closeModal();});

load();renderSidebar();renderMain();
</script>
</body>
</html>
